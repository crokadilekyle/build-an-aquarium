<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creek Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="inner">
      <a class="brand" href="./">Creek Games</a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="#gamesGrid">Games</a>
        <a href="./build-an-aquarium/">Play Now</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="inner hero-inner">
      <div>
        <p class="kicker">Arcade Portal</p>
        <h1>Creek Games</h1>
        <p class="subtitle">A growing collection of fun little browser games. Pick one and play instantly.</p>
        <p class="meta"><span id="gameCount">0</span> live game</p>
      </div>
      <div class="hero-art">
        <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f3ae.svg" alt="Video game controller illustration" />
      </div>
    </div>
  </section>

  <main class="page">
    <section class="grid" id="gamesGrid" aria-label="Game library"></section>
  </main>

  <template id="gameCardTemplate">
    <article class="card">
      <div class="card-art"><img alt="" loading="lazy" /></div>
      <div class="badge">Playable Now</div>
      <h2></h2>
      <p class="description"></p>
      <a class="play">Play</a>
    </article>
  </template>

  <script>
    const games = [
      {
        title: "Build an Aquarium",
        description: "Tap for shells, buy fish, and grow your underwater clicker tank.",
        href: "./build-an-aquarium/",
        icon: "https://img.icons8.com/color/256/clown-fish.png"
      }
    ];

    const grid = document.getElementById("gamesGrid");
    const template = document.getElementById("gameCardTemplate");
    const count = document.getElementById("gameCount");

    count.textContent = String(games.length);
    if (games.length !== 1) {
      count.parentElement.textContent = `${games.length} live games`;
    }

    games.forEach((game) => {
      const card = template.content.cloneNode(true);
      card.querySelector("img").src = game.icon;
      card.querySelector("img").alt = game.title;
      card.querySelector("h2").textContent = game.title;
      card.querySelector(".description").textContent = game.description;
      const link = card.querySelector(".play");
      link.href = game.href;
      link.textContent = `Play ${game.title}`;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
